<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TeleRelay Direct</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" />
    <style>
        body {
            background: #1a1a2e;
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 24px 12px 40px;
        }

        .card {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 12px;
            width: 100%;
            max-width: clamp(320px, 90vw, 900px);
        }

        .card-header {
            background: linear-gradient(135deg, #0f3460, #e94560);
            border-radius: 12px 12px 0 0 !important;
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: .4px;
        }

        .form-control {
            background: #0d1b2a;
            border: 1px solid #0f3460;
            color: #eee;
            border-radius: 8px;
        }

        .form-control:focus {
            background: #0d1b2a;
            border-color: #e94560;
            color: #eee;
            box-shadow: 0 0 0 2px rgba(233, 69, 96, .25);
        }

        .form-control::placeholder {
            color: #4a6080;
        }

        label {
            color: #7a8fa6;
            font-size: .82rem;
            margin-bottom: 3px;
        }

        .btn-primary-custom {
            background: linear-gradient(135deg, #e94560, #0f3460);
            border: none;
            color: #fff;
            border-radius: 8px;
            font-weight: 600;
            letter-spacing: .3px;
            transition: opacity .2s;
        }

        .btn-primary-custom:hover {
            opacity: .88;
            color: #fff;
        }

        #setup-error {
            font-size: .82rem;
        }

        /* ── Chat card ─────────────────────────────────────── */
        #chat-box {
            height: calc(100vh - 310px);
            min-height: 260px;
            overflow-y: auto;
            padding: 8px 4px;
        }

        .msg-bubble {
            max-width: 78%;
            margin: 6px 0;
            padding: 8px 12px;
            border-radius: 14px;
            word-break: break-word;
            font-size: .88rem;
            line-height: 1.45;
        }

        .msg-bot {
            background: #0f3460;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }

        .msg-other {
            background: #1a3a5c;
            border-bottom-left-radius: 4px;
        }

        .msg-media {
            background: #112244;
            border: 1px solid #1a3a5c;
        }

        .msg-sender {
            font-size: .72rem;
            color: #7a8fa6;
            margin-bottom: 3px;
        }

        .msg-time {
            font-size: .68rem;
            color: #4a6080;
            text-align: right;
            margin-top: 4px;
        }

        .history-divider {
            text-align: center;
            color: #4a6080;
            font-size: .72rem;
            margin: 8px 0;
            position: relative;
        }

        .history-divider::before,
        .history-divider::after {
            content: '';
            display: inline-block;
            width: 60px;
            height: 1px;
            background: #1a3a5c;
            vertical-align: middle;
            margin: 0 8px;
        }

        /* Status dot */
        #status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 5px;
            vertical-align: middle;
        }

        #status-dot.online {
            background: #2ecc71;
        }

        #status-dot.offline {
            background: #e94560;
        }

        #polling-status {
            font-size: .75rem;
            color: #7a8fa6;
            vertical-align: middle;
        }

        /* Buttons */
        #btn-logout {
            background: #e94560;
            border: none;
            color: #fff;
            font-size: .72rem;
            border-radius: 6px;
            padding: 2px 10px;
        }

        #btn-logout:hover {
            background: #c73652;
        }

        #btn-send {
            background: linear-gradient(135deg, #e94560, #0f3460);
            border: none;
            color: #fff;
            border-radius: 0 8px 8px 0;
            min-width: 48px;
        }

        #btn-send:hover {
            opacity: .88;
        }

        #btn-clear-history {
            background: transparent;
            border: 1px solid #1a3a5c;
            color: #7a8fa6;
            font-size: .72rem;
            border-radius: 6px;
        }

        #btn-clear-history:hover {
            border-color: #e94560;
            color: #e94560;
        }

        #btn-attach {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            background: #0d1b2a;
            border: 1px solid #0f3460;
            border-right: none;
            border-radius: 8px 0 0 8px;
            cursor: pointer;
            font-size: 1.1rem;
            color: #7a8fa6;
            transition: color .2s;
        }

        #btn-attach:hover {
            color: #e94560;
        }

        #msg-input {
            border-radius: 0 !important;
        }

        /* Upload progress */
        #upload-progress-wrap {
            height: 4px;
            background: #0d1b2a;
            border-radius: 2px;
            margin-top: 6px;
            overflow: hidden;
        }

        #upload-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #0f3460);
            width: 0;
            transition: width .3s;
        }

        #upload-status {
            font-size: .75rem;
            color: #7a8fa6;
            min-height: 1em;
        }

        /* Media bubbles */
        .media-filename {
            font-size: .8rem;
            color: #90e0ef;
            word-break: break-all;
        }

        .btn-dl {
            background: linear-gradient(135deg, #0f3460, #e94560);
            border: none;
            color: #fff;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: .75rem;
            cursor: pointer;
        }

        .btn-dl:hover {
            opacity: .85;
        }

        .msg-media img {
            max-width: 100%;
            border-radius: 8px;
            margin-bottom: 6px;
            cursor: pointer;
        }

        .media-icon {
            font-size: 1.4rem;
            margin-right: 6px;
        }

        /* ── Responsive ─────────────────────────────────────── */
        @media (max-width: 575px) {
            body {
                padding: 10px 6px 30px;
            }

            .card {
                max-width: 100%;
                border-radius: 8px;
            }

            #chat-box {
                height: calc(100vh - 260px);
            }
        }

        @media (min-width: 1400px) {
            .card {
                max-width: 1100px;
            }
        }
    </style>
</head>

<body>

    <!-- =================== SETUP CARD =================== -->
    <div id="setup-card">
        <div class="card shadow">
            <div class="card-header text-white py-3 text-center">
                ⚡ TeleRelay Direct
            </div>
            <div class="card-body p-4">
                <p class="text-muted" style="font-size:.82rem;">
                    Enter your display name and the secret access key to connect.
                </p>

                <div class="form-group">
                    <label>Display Name</label>
                    <input type="text" id="input-myname" class="form-control" placeholder="e.g. Husband or Wife"
                        autocomplete="off" />
                </div>

                <div class="form-group">
                    <label>Secret Key</label>
                    <input type="password" id="input-secretkey" class="form-control" placeholder="Enter your secret key" maxlength="4" 
                        autocomplete="off" />
                    <small class="text-muted">The key that unlocks access to this channel.</small>
                </div>

                <div id="setup-error" class="alert alert-danger d-none py-2"></div>

                <button id="btn-save" class="btn btn-primary-custom btn-block py-2 mt-2">
                    ✔ Connect
                </button>
            </div>
        </div>
    </div>

    <!-- =================== CHAT CARD =================== -->
    <div id="chat-card" class="d-none">
        <div class="card shadow">
            <div class="card-header text-white d-flex justify-content-between align-items-center py-2">
                <span>⚡ TeleRelay Direct</span>
                <div>
                    <span id="status-dot"></span>
                    <span id="polling-status">Connecting...</span>
                    <button id="btn-logout" class="btn btn-sm ml-3">Logout</button>
                </div>
            </div>
            <div class="card-body p-3">
                <div id="chat-box"></div>
                <div class="input-group mt-3">
                    <label for="file-input" id="btn-attach" title="Send file / image">&#128206;</label>
                    <input type="file" id="file-input" style="display:none" />
                    <input type="text" id="msg-input" class="form-control" placeholder="Type a message..."
                        autocomplete="off" />
                    <div class="input-group-append">
                        <button id="btn-send" class="btn text-white px-3">&#9658;</button>
                    </div>
                </div>
                <!-- Upload progress -->
                <div id="upload-progress-wrap" class="d-none">
                    <div id="upload-progress-bar"></div>
                </div>
                <div id="upload-status"></div>
                <div class="d-flex justify-content-between align-items-center mt-1">
                    <button id="btn-clear-history" class="btn btn-sm">&#128465; Clear History</button>
                    <small class="text-muted" id="identity-label"></small>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script>

        // ============================================================
        // >>>  CONFIGURE THESE VALUES FOR YOUR DEPLOYMENT  <<<
        // ============================================================

        // Split your bot token: PART1 + <decoded secret key> + PART2
        // Example full token: 1013670964:AAG1234ZnLb9ozHpNRfGS94CBQ-jwMQGEWg
        //   PART1 = "1013670964:AAG1234ZnLb9ozHpNR"
        //   key   = "fGS9"   (entered as "Test" by user, decoded by reverseShiftString)
        //   PART2 = "4CBQ-jwMQGEWg"
        const TOKEN_PART1 = "1013670964:AAGTlXNZnLb9ozHpNR"; // <<< PUT YOUR PART1 HERE
        const TOKEN_PART2 = "4CBQ-jwMQGEWg";                 // <<< PUT YOUR PART2 HERE
        const HARDCODED_CHAT_ID = "-1003716142378";           // <<< PUT YOUR GROUP CHAT ID HERE

        // ============================================================
        // SECRET KEY DECODER
        // reverseShifts are the OPPOSITE of your original shifts array.
        // Example: original shifts = [-18, 30, 32, 59]
        //          reverse  shifts = [ 18,-30,-32,-59]
        // reverseShiftString("Test") === "fGS9"  (with the shifts below)
        // ============================================================
        const REVERSE_SHIFTS = [46, 17, 29, 5]; // <<< ADJUST TO MATCH YOUR CIPHER

        function reverseShiftString(input) {
            let result = '';
            for (let i = 0; i < input.length; i++) {
                result += String.fromCharCode(
                    input.charCodeAt(i) + REVERSE_SHIFTS[i % REVERSE_SHIFTS.length]
                );
            }
            return result;
        }

        // ============================================================
        // APP STATE
        // ============================================================
        const STORAGE_KEY = 'dr_cfg';
        const HISTORY_KEY = 'dr_history';
        const LAST_UPDATE_KEY = 'dr_last_upd';
        const HISTORY_TTL_MS = 24 * 60 * 60 * 1000; // 24 hours

        let pollingTimer = null;
        let lastUpdateId = 0;
        let myName = '';
        let botToken = ''; // assembled full token (in memory only)
        let chatId = HARDCODED_CHAT_ID;
        let seenUpdateIds = new Set();

        // ============================================================
        // INIT
        // ============================================================
        $(function () {
            loadConfig();
            $('#btn-save').on('click', saveConfig);
            $('#btn-send').on('click', sendMessage);
            $('#msg-input').on('keydown', function (e) {
                if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
            });
            $('#btn-logout').on('click', logout);
            $('#btn-clear-history').on('click', clearHistory);
            $('#file-input').on('change', function () {
                const file = this.files[0];
                if (!file) return;
                this.value = ''; // reset so same file can be re-selected
                sendFile(file);
            });
        });

        // ============================================================
        // CONFIG — Save / Load / Logout
        // ============================================================
        function saveConfig() {
            const rawName = $('#input-myname').val().trim();
            const rawKey = $('#input-secretkey').val().trim();

            if (!rawName || !rawKey) {
                $('#setup-error').text('Please fill in both fields.').removeClass('d-none');
                return;
            }

            // Decode the secret key → missing token fragment
            const decodedFragment = reverseShiftString(rawKey);
            const assembled = TOKEN_PART1 + decodedFragment + TOKEN_PART2;

            // Quick sanity check: a Telegram bot token always contains ":"
            if (assembled.indexOf(':') === -1) {
                $('#setup-error').text('Invalid secret key — token could not be assembled.').removeClass('d-none');
                return;
            }

            // Store in localStorage: save the raw secret key (user-entered) and name
            localStorage.setItem(STORAGE_KEY, JSON.stringify({
                secretKey: rawKey,
                myName: rawName
            }));

            botToken = assembled;
            myName = rawName;
            chatId = HARDCODED_CHAT_ID;

            $('#setup-error').addClass('d-none');
            startSession();
        }

        function loadConfig() {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return;
            try {
                const cfg = JSON.parse(raw);
                if (!cfg.secretKey || !cfg.myName) return;

                const decodedFragment = reverseShiftString(cfg.secretKey);
                botToken = TOKEN_PART1 + decodedFragment + TOKEN_PART2;
                myName = cfg.myName;
                chatId = HARDCODED_CHAT_ID;

                startSession();
            } catch (e) {
                localStorage.removeItem(STORAGE_KEY);
            }
        }

        function logout() {
            clearInterval(pollingTimer);
            pollingTimer = null;
            lastUpdateId = 0;
            botToken = '';
            myName = '';
            seenUpdateIds = new Set();
            $('#chat-box').empty();
            $('#chat-card').addClass('d-none');
            $('#setup-card').removeClass('d-none');
            $('#input-myname').val('');
            $('#input-secretkey').val('');
            $('#setup-error').addClass('d-none');
            // Keep history; remove only credentials
            localStorage.removeItem(STORAGE_KEY);
        }

        function clearHistory() {
            if (!confirm('Delete all saved chat history?')) return;
            localStorage.removeItem(HISTORY_KEY);
            localStorage.removeItem(LAST_UPDATE_KEY);
            lastUpdateId = 0;
            seenUpdateIds = new Set();
            $('#chat-box').empty();
        }

        // ============================================================
        // SESSION + POLLING
        // ============================================================
        function startSession() {
            $('#setup-card').addClass('d-none');
            $('#chat-card').removeClass('d-none');
            $('#identity-label').text('Sending as: ' + myName + ' (via bot)');

            loadHistory();

            setDot('offline');
            pollUpdates();
            pollingTimer = setInterval(pollUpdates, 4000);
        }

        function apiUrl(method) {
            return 'https://api.telegram.org/bot' + botToken + '/' + method;
        }

        function pollUpdates() {
            const params = {
                offset: lastUpdateId + 1,
                limit: 100,
                allowed_updates: ['message']
            };
            $.ajax({
                url: apiUrl('getUpdates'),
                data: params,
                method: 'GET',
                timeout: 8000,
                success: function (res) {
                    setDot('online');
                    if (res.ok && res.result.length > 0) {
                        res.result.forEach(function (upd) {
                            if (upd.update_id > lastUpdateId) lastUpdateId = upd.update_id;
                            if (upd.message) handleIncoming(upd.message, upd.update_id);
                        });
                        localStorage.setItem(LAST_UPDATE_KEY, String(lastUpdateId));
                    }
                },
                error: function () { setDot('offline'); }
            });
        }

        function setDot(state) {
            $('#status-dot').attr('class', state);
            $('#polling-status').text(state === 'online' ? 'Connected' : 'Offline / Failed');
        }

        // ============================================================
        // HISTORY — localStorage (24-hour TTL)
        // ============================================================
        function saveHistory(entry) {
            let history = getRawHistory();
            history = pruneOldMessages(history);
            history.push(entry);
            if (history.length > 500) history = history.slice(history.length - 500);
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
        }

        function getRawHistory() {
            try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); }
            catch (e) { return []; }
        }

        function pruneOldMessages(history) {
            const cutoff = Date.now() - HISTORY_TTL_MS;
            return history.filter(function (e) { return e.ts >= cutoff; });
        }

        function loadHistory() {
            const storedUpdId = parseInt(localStorage.getItem(LAST_UPDATE_KEY) || '0', 10);
            if (storedUpdId > lastUpdateId) lastUpdateId = storedUpdId;

            let history = getRawHistory();
            history = pruneOldMessages(history);
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));

            if (history.length === 0) return;

            $('#chat-box').append('<div class="history-divider">— Saved history —</div>');

            history.forEach(function (e) {
                const timeStr = formatTime(Math.floor(e.ts / 1000));
                if (e.type === 'media') {
                    appendMediaBubble({
                        fileId: e.fileId,
                        mediaType: e.mediaType,
                        fileName: e.fileName,
                        fileSize: e.fileSize || 0,
                        caption: e.caption || '',
                        sender: e.sender,
                        ts: timeStr,
                        nowMs: undefined,
                        css: e.cssClass,
                        updateId: e.updateId
                    });
                } else {
                    renderBubble(e.text, e.sender, timeStr, e.cssClass);
                }
                if (e.updateId) seenUpdateIds.add(e.updateId);
                if (e.updateId && e.updateId > lastUpdateId) lastUpdateId = e.updateId;
            });

            $('#chat-box').append('<div class="history-divider">— Now —</div>');
            const $box = $('#chat-box');
            $box.scrollTop($box[0].scrollHeight);
        }

        // ============================================================
        // MESSAGE HANDLING
        // ============================================================
        function handleIncoming(msg, updateId) {
            if (updateId && seenUpdateIds.has(updateId)) return;
            if (updateId) seenUpdateIds.add(updateId);

            const sender = msg.from ? (msg.from.first_name || 'Unknown') : 'Unknown';
            const isBot = msg.from && msg.from.is_bot;
            const css = isBot ? 'msg-bot' : 'msg-other';
            const nowMs = msg.date ? msg.date * 1000 : Date.now();
            const ts = formatTime(Math.floor(nowMs / 1000));

            let mediaObj = null;
            let mediaType = null;

            if (msg.photo && msg.photo.length) {
                mediaObj = msg.photo[msg.photo.length - 1];
                mediaType = 'photo';
            } else if (msg.document) { mediaObj = msg.document; mediaType = 'document'; }
            else if (msg.video) { mediaObj = msg.video; mediaType = 'video'; }
            else if (msg.audio) { mediaObj = msg.audio; mediaType = 'audio'; }
            else if (msg.voice) { mediaObj = msg.voice; mediaType = 'voice'; }
            else if (msg.sticker) { mediaObj = msg.sticker; mediaType = 'sticker'; }

            if (mediaObj) {
                appendMediaBubble({
                    fileId: mediaObj.file_id,
                    mediaType: mediaType,
                    fileName: mediaObj.file_name || (mediaType + '_' + (mediaObj.file_unique_id || '')),
                    fileSize: mediaObj.file_size || 0,
                    caption: msg.caption || '',
                    sender: sender,
                    ts: ts,
                    nowMs: nowMs,
                    css: css,
                    updateId: updateId
                });
            } else {
                const text = msg.text || msg.caption || '[non-text]';
                appendMessage(text, sender, ts, css, nowMs, updateId);
            }
        }

        function appendMessage(text, sender, ts, cssClass, nowMs, updateId) {
            renderBubble(text, sender, ts, cssClass);
            if (nowMs !== undefined) {
                saveHistory({ text: text, sender: sender, ts: nowMs || Date.now(), cssClass: cssClass, updateId: updateId || null });
            }
        }

        function renderBubble(text, sender, ts, cssClass) {
            const html = `
<div class="msg-bubble ${cssClass}">
  <div class="msg-sender">${escapeHtml(sender)}</div>
  <div>${escapeHtml(text)}</div>
  <div class="msg-time">${ts}</div>
</div>`;
            const $box = $('#chat-box');
            $box.append(html);
            $box.scrollTop($box[0].scrollHeight);
        }

        // ============================================================
        // SEND TEXT MESSAGE
        // ============================================================
        function sendMessage() {
            const text = $('#msg-input').val().trim();
            if (!text) return;
            $('#msg-input').val('').prop('disabled', true);

            $.ajax({
                url: apiUrl('sendMessage'),
                method: 'POST',
                data: { chat_id: chatId, text: '[' + myName + ']: ' + text },
                success: function (res) {
                    $('#msg-input').prop('disabled', false).focus();
                    if (res.ok && res.result) {
                        const msg = res.result;
                        const nowMs = msg.date ? msg.date * 1000 : Date.now();
                        seenUpdateIds.add('sent_' + msg.message_id);
                        seenUpdateIds.add('mid_' + msg.message_id);
                        appendMessage(
                            '[' + myName + ']: ' + text,
                            myName + ' (You)',
                            formatTime(Math.floor(nowMs / 1000)),
                            'msg-bot', nowMs, null
                        );
                    }
                },
                error: function () {
                    $('#msg-input').prop('disabled', false);
                    alert('Failed to send message. Check your connection or secret key.');
                }
            });
        }

        // ============================================================
        // FILE UPLOAD
        // ============================================================
        const MAX_FILE_BYTES = 50 * 1024 * 1024; // 50 MB

        function sendFile(file) {
            if (!botToken || !chatId) { alert('Not connected.'); return; }
            if (file.size > MAX_FILE_BYTES) {
                alert('File too large. Maximum is 50 MB (Telegram Bot API limit).');
                return;
            }

            const isImage = file.type.startsWith('image/');
            const endpoint = isImage ? 'sendPhoto' : 'sendDocument';
            const field = isImage ? 'photo' : 'document';

            const fd = new FormData();
            fd.append('chat_id', chatId);
            fd.append('caption', '[' + myName + '] sent a file');
            fd.append(field, file, file.name);

            const xhr = new XMLHttpRequest();
            xhr.open('POST', 'https://api.telegram.org/bot' + botToken + '/' + endpoint);

            $('#upload-progress-wrap').removeClass('d-none');
            $('#upload-progress-bar').css('width', '0');
            $('#upload-status').text('Uploading ' + file.name + '...');
            $('#msg-input, #btn-send').prop('disabled', true);

            xhr.upload.onprogress = function (e) {
                if (e.lengthComputable) {
                    const pct = Math.round(e.loaded / e.total * 100);
                    $('#upload-progress-bar').css('width', pct + '%');
                    $('#upload-status').text('Uploading ' + pct + '%  \u2014 ' + file.name);
                }
            };

            xhr.onload = function () {
                $('#upload-progress-wrap').addClass('d-none');
                $('#msg-input, #btn-send').prop('disabled', false);
                try {
                    const res = JSON.parse(xhr.responseText);
                    if (res.ok && res.result) {
                        const sentMsg = res.result;
                        const nowMs = sentMsg.date ? sentMsg.date * 1000 : Date.now();
                        const mediaObj = sentMsg.photo
                            ? sentMsg.photo[sentMsg.photo.length - 1]
                            : (sentMsg.document || sentMsg.video || sentMsg.audio || sentMsg.voice);
                        const mType = sentMsg.photo ? 'photo' :
                            sentMsg.document ? 'document' :
                                sentMsg.video ? 'video' :
                                    sentMsg.audio ? 'audio' : 'voice';

                        seenUpdateIds.add('mid_' + sentMsg.message_id);
                        $('#upload-status').text('Sent: ' + file.name);

                        if (mediaObj) {
                            appendMediaBubble({
                                fileId: mediaObj.file_id,
                                mediaType: mType,
                                fileName: file.name,
                                fileSize: file.size,
                                caption: '',
                                sender: myName + ' (You)',
                                ts: formatTime(Math.floor(nowMs / 1000)),
                                nowMs: nowMs,
                                css: 'msg-bot',
                                updateId: null
                            });
                        }
                    } else {
                        $('#upload-status').text('Failed: ' + (res.description || 'unknown error'));
                    }
                } catch (e) {
                    $('#upload-status').text('Failed to parse response.');
                }
            };

            xhr.onerror = function () {
                $('#upload-progress-wrap').addClass('d-none');
                $('#msg-input, #btn-send').prop('disabled', false);
                $('#upload-status').text('Connection failed during upload.');
            };

            xhr.send(fd);
        }

        // ============================================================
        // MEDIA BUBBLES + DOWNLOAD
        // ============================================================
        const MEDIA_ICONS = {
            photo: '\uD83D\uDDBC',
            sticker: '\uD83C\uDFAD',
            document: '\uD83D\uDCCE',
            video: '\uD83C\uDFA5',
            audio: '\uD83C\uDFB5',
            voice: '\uD83C\uDFA4'
        };

        function appendMediaBubble(opts) {
            const icon = MEDIA_ICONS[opts.mediaType] || '\uD83D\uDCCE';
            const sizeStr = opts.fileSize ? ' (' + formatBytes(opts.fileSize) + ')' : '';
            const captionHtml = opts.caption
                ? '<div class="mt-1" style="font-size:.8rem;color:#ccc;">' + escapeHtml(opts.caption) + '</div>' : '';
            const bubbleId = 'media-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6);

            const html = `
<div class="msg-bubble msg-media ${opts.css}" id="${bubbleId}">
  <div class="msg-sender">${escapeHtml(opts.sender)}</div>
  <div class="d-flex align-items-center">
    <span class="media-icon">${icon}</span>
    <span class="media-filename">${escapeHtml(opts.fileName)}${escapeHtml(sizeStr)}</span>
  </div>
  ${captionHtml}
  <div class="mt-2">
    <button class="btn-dl" onclick="downloadMedia('${opts.fileId}', '${escapeHtml(opts.fileName)}')">&#8681; Download</button>
  </div>
  <div class="msg-time">${opts.ts}</div>
</div>`;

            const $box = $('#chat-box');
            $box.append(html);
            $box.scrollTop($box[0].scrollHeight);

            if (opts.mediaType === 'photo' || opts.mediaType === 'sticker') {
                getFileUrl(opts.fileId).then(function (url) {
                    const $bubble = $('#' + bubbleId);
                    $bubble.find('.btn-dl').before('<img src="' + url + '" alt="photo" onclick="window.open(this.src,\'_blank\')"/>');
                    $box.scrollTop($box[0].scrollHeight);
                }).catch(function () { /* thumbnail failed — harmless */ });
            }

            if (opts.nowMs !== undefined) {
                saveHistory({
                    type: 'media',
                    fileId: opts.fileId,
                    mediaType: opts.mediaType,
                    fileName: opts.fileName,
                    fileSize: opts.fileSize,
                    caption: opts.caption,
                    sender: opts.sender,
                    ts: opts.nowMs || Date.now(),
                    cssClass: opts.css,
                    updateId: opts.updateId || null
                });
            }
        }

        function getFileUrl(fileId) {
            return $.ajax({
                url: apiUrl('getFile'),
                data: { file_id: fileId },
                method: 'GET'
            }).then(function (res) {
                if (res.ok && res.result.file_path) {
                    return 'https://api.telegram.org/file/bot' + botToken + '/' + res.result.file_path;
                }
                throw new Error('getFile failed');
            });
        }

        function downloadMedia(fileId, fileName) {
            getFileUrl(fileId).then(function (url) {
                const a = document.createElement('a');
                a.href = url;
                a.target = '_blank';
                a.download = fileName || 'file';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }).catch(function () {
                alert('Could not get download link. Please try again.');
            });
        }

        // ============================================================
        // UTILS
        // ============================================================
        function formatBytes(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1048576).toFixed(1) + ' MB';
        }

        function formatTime(unixTs) {
            const d = new Date(unixTs * 1000);
            return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

    </script>
</body>

</html>
